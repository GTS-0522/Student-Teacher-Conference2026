<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17365d">
  <meta name="description" content="二者面談の日程を管理する教師用ページ">
  <title>二者面談 日程管理｜教師用</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="teacher">
  <header class="app-header">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">▦</span>
      <div>
        <p class="eyebrow">TEACHER</p>
        <h1>二者面談 日程管理</h1>
      </div>
    </div>
    <button class="icon-button" id="refreshButton" type="button" aria-label="予定を更新" title="予定を更新">
      <span aria-hidden="true">↻</span>
    </button>
  </header>

  <main class="page-shell">
    <section class="intro-row" aria-labelledby="rangeTitle">
      <div>
        <p class="section-kicker">2026年度</p>
        <h2 id="rangeTitle">8月17日（月）— 8月28日（金）</h2>
        <p class="updated-text" id="updatedText">予定を読み込んでいます…</p>
      </div>
      <button class="primary-button compact" id="addButton" type="button">
        <span aria-hidden="true">＋</span>予定を追加
      </button>
    </section>

    <div class="setup-alert" id="setupAlert" hidden>
      <strong>初期設定が必要です</strong>
      <span>config.js にGASのウェブアプリURLを設定してください。現在は見本データを表示しています。</span>
    </div>

    <section class="calendar-card" aria-label="二者面談カレンダー">
      <div class="calendar-toolbar">
        <div class="legend" aria-label="予定の色分け">
          <span><i class="legend-dot interview"></i>二者面談</span>
          <span><i class="legend-dot teacher"></i>教師予定</span>
        </div>
        <p class="swipe-hint"><span aria-hidden="true">←</span> 横にスワイプ <span aria-hidden="true">→</span></p>
      </div>
      <div class="calendar-scroll" id="calendarScroll" tabindex="0" aria-label="横にスクロールできます">
        <div class="calendar-stage" id="calendarStage"></div>
      </div>
    </section>

    <p class="tap-help">空いている時間帯を押しても、予定を追加できます。</p>
  </main>

  <dialog class="event-dialog" id="eventDialog">
    <form method="dialog" id="eventForm" novalidate>
      <div class="dialog-header">
        <div>
          <p class="section-kicker">SCHEDULE</p>
          <h2 id="dialogTitle">予定を追加</h2>
        </div>
        <button class="close-button" type="button" id="closeDialog" aria-label="閉じる">×</button>
      </div>

      <input type="hidden" id="eventId">
      <fieldset class="type-switch">
        <legend>予定の種類</legend>
        <label><input type="radio" name="eventType" value="interview" checked><span>二者面談</span></label>
        <label><input type="radio" name="eventType" value="teacher"><span>教師予定</span></label>
      </fieldset>

      <div class="form-grid two-columns">
        <label class="field">日付
          <select id="eventDate" required></select>
        </label>
        <div class="time-fields">
          <label class="field">開始
            <select id="startTime" required></select>
          </label>
          <label class="field">終了
            <select id="endTime" required></select>
          </label>
        </div>
      </div>

      <label class="field" id="studentNameField">生徒名
        <input id="studentName" type="text" maxlength="40" autocomplete="off" placeholder="例：佐藤 花子">
      </label>
      <label class="field" id="teacherTitleField" hidden>予定名
        <input id="teacherTitle" type="text" maxlength="60" autocomplete="off" placeholder="例：職員会議、教材準備">
      </label>

      <p class="form-error" id="formError" role="alert"></p>
      <div class="dialog-actions">
        <button class="danger-button" id="deleteButton" type="button" hidden>削除</button>
        <span class="action-spacer"></span>
        <button class="secondary-button" id="cancelButton" type="button">キャンセル</button>
        <button class="primary-button" id="saveButton" type="submit">保存する</button>
      </div>
    </form>
  </dialog>

  <dialog class="password-dialog" id="passwordDialog">
    <form method="dialog" id="passwordForm">
      <p class="section-kicker">SECURITY</p>
      <h2>管理パスワード</h2>
      <p>予定を変更するための管理パスワードを入力してください。</p>
      <label class="field">パスワード
        <input id="teacherPassword" type="password" autocomplete="current-password" required>
      </label>
      <p class="form-error" id="passwordError" role="alert"></p>
      <div class="dialog-actions">
        <button class="secondary-button" id="passwordCancel" type="button">キャンセル</button>
        <button class="primary-button" type="submit">確認</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
