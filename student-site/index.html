<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17365d">
  <meta name="description" content="二者面談の日程を確認する生徒用ページ">
  <title>二者面談 日程確認</title>
  <link rel="stylesheet" href="styles.css?v=20260712-3">
</head>
<body data-page="student">
  <header class="app-header">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">▦</span>
      <div>
        <p class="eyebrow">STUDENT</p>
        <h1>二者面談 日程確認</h1>
      </div>
    </div>
    <button class="icon-button" id="refreshButton" type="button" aria-label="予定を更新" title="予定を更新"><span aria-hidden="true">↻</span></button>
  </header>

  <main class="page-shell">
    <section class="intro-row" aria-labelledby="rangeTitle">
      <div>
        <p class="section-kicker">2026年度</p>
        <h2 id="rangeTitle">8月17日（月）— 8月28日（金）</h2>
        <p class="updated-text" id="updatedText">予定を読み込んでいます…</p>
      </div>
    </section>

    <div class="setup-alert" id="setupAlert" hidden>
      <strong>見本表示です</strong>
      <span>管理者が接続設定を完了すると、最新の予定が表示されます。</span>
    </div>

    <section class="calendar-card" aria-label="二者面談カレンダー">
      <div class="calendar-toolbar">
        <div class="legend" aria-label="予定の色分け">
          <span><i class="legend-dot interview"></i>二者面談</span>
          <span><i class="legend-dot teacher"></i>教師予定</span>
        </div>
        <p class="swipe-hint"><span aria-hidden="true">←</span> 横にスワイプ <span aria-hidden="true">→</span></p>
      </div>
      <div class="calendar-scroll" id="calendarScroll" tabindex="0" aria-label="横にスクロールできます">
        <div class="calendar-stage" id="calendarStage"></div>
      </div>
    </section>

    <section class="request-cta">
      <div>
        <p class="section-kicker">REQUEST</p>
        <h2>面談の希望日時を送る</h2>
        <p>空いている時間を確認してから、希望する日時を入力してください。</p>
      </div>
      <a class="primary-button" href="request.html">希望入力へ</a>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="config.js?v=20260712-3"></script>
  <script src="app.js?v=20260712-3"></script>
</body>
</html>
